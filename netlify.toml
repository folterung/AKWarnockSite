[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Dev: proxy resume-game to Vite dev server (force=true bypasses Next.js trailingSlash)
# Prod: static files in out/resume-game/ are served directly, so this redirect is ignored
[[redirects]]
  from = "/resume-game/*"
  to = "http://localhost:5174/resume-game/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"